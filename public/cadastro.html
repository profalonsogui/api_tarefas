<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - API Tarefas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-user-plus"></i> Criar Conta</h1>
            <p>Cadastre-se para gerenciar suas tarefas</p>
        </header>

        <form id="formCadastro">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
            </div>
            <button type="submit" id="btnSalvar">Cadastrar</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Já tem conta? <a href="login.html" style="color: var(--primary);">Faça Login</a>
        </p>
    </div>

    <script src="js/cadastro.js"></script>
</body>
</html>
