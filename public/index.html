<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API de Tarefas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header style="display: flex; justify-content: space-between; padding: 10px; background: #f4f4f4;">
    <div>
        <span id="boasVindas"></span> 
    </div>
    <button onclick="logout()" style="background: #d9534f; color: white; border: none; padding: 5px 10px; cursor: pointer;">
        Sair
    </button>
</header>
  <div class="container">
    <h1>Gestão de Tarefas</h1>

    <form id="formTarefa">
      <input type="text" id="titulo" placeholder="Título da tarefa" required>
      <textarea id="descricao" placeholder="Descrição da tarefa" required></textarea>
      <button type="submit">Cadastrar</button>
    </form>

    <h2>Lista de Tarefas</h2>
    <div id="listaTarefas"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
